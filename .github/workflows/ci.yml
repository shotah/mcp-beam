name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Build binary
        run: go build -ldflags "-s -w -X go2tv.app/mcp-beam/internal/buildinfo.Version=ci" -o bin/mcp-beam .

      - name: Self-test
        run: ./bin/mcp-beam --self-test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Test
        run: go test ./... -count=1 -timeout 5m

      - name: Race tests
        run: go test -race ./... -count=1 -timeout 10m
