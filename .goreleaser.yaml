# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: mcp-beam

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-beam
    main: .
    binary: mcp-beam
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X go2tv.app/mcp-beam/internal/buildinfo.Version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
